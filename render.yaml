services:
  - type: web
    name: spend-shelf
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn expense_tracker.wsgi:application --log-file -
    pythonVersion: 3.12.3
    preDeployCommand: python manage.py migrate
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
