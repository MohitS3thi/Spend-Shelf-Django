{% extends 'base.html' %}
{% block title %}Sign Up | Spend Shelf{% endblock %}
{% block content %}
<section class="card auth-card">
    <h1>Create Account</h1>
    <p class="muted">Start building better spending habits today.</p>
    <form method="post" class="stack-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary">Sign Up</button>
    </form>
    <p class="muted">Already registered? <a href="{% url 'login' %}">Login</a></p>
</section>
{% endblock %}
